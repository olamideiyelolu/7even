<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Professional Auth Mockup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="canvas">
      <section class="card" aria-labelledby="sign-in-heading">
        <p class="brand">7even</p>
        <h1 id="sign-in-heading">Welcome Back</h1>
        <p class="subtitle">Sign in to continue to your workspace.</p>

        <form class="form" action="#" method="post">
          <p class="info-bar alert" role="alert">
            Account already exists. Please sign in to continue.
          </p>

          <label class="field-label" for="login-email">Work Email</label>
          <input id="login-email" type="email" placeholder="name@company.com" />

          <label class="field-label" for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="Enter password" />

          <a class="inline-link" href="#">Forgot Password?</a>

          <div class="actions">
            <button class="btn primary" type="submit">Sign In</button>
            <a class="btn ghost" href="./create-account.html">Create Account</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
