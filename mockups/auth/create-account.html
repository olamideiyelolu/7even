<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Professional Auth Mockup</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="canvas">
      <section class="card" aria-labelledby="create-account-heading">
        <p class="brand">7even</p>
        <h1 id="create-account-heading">Create Account</h1>
        <p class="subtitle">Get started with a secure account in under a minute.</p>

        <form class="form" action="#" method="post">
          <label class="field-label" for="create-email">Work Email</label>
          <input id="create-email" type="email" placeholder="name@company.com" />

          <label class="field-label" for="create-password">Password</label>
          <input id="create-password" type="password" placeholder="Enter password" />

          <label class="field-label" for="confirm-password">Confirm Password</label>
          <input id="confirm-password" type="password" placeholder="Re-enter password" />
          <p class="info-bar match" role="status">Password check: values match and look correct.</p>

          <div class="actions">
            <button class="btn primary" type="submit">Create Account</button>
            <a class="btn ghost" href="./sign-in.html">Log In</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
